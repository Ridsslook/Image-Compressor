<!DOCTYPE html>
<html>
<head>
<title>Image Compressor</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:100px;
background:#f2f2f2;
}

.container{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

img{
margin-top:20px;
max-width:100%;
}

</style>

</head>

<body>

<div class="container">

<h2>Image Compressor</h2>

<input type="file" id="imageInput"><br><br>

<button onclick="uploadImage()">Compress Image</button>

<br>

<img id="result"/>

</div>

<script>

function uploadImage(){

let file = document.getElementById("imageInput").files[0];

let formData = new FormData();

formData.append("image", file);

fetch("http://localhost:8000",{
method:"POST",
body:formData
})
.then(res=>{

if(res.status==429){
alert("Rate limit exceeded. Try again after 10 minutes");
return;
}

return res.blob();

})
.then(blob=>{

if(!blob) return;

let url = URL.createObjectURL(blob);

document.getElementById("result").src = url;

})

}

</script>

</body>
</html>
